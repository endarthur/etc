<body>

<h1>GCU Geode — POC</h1>
<div id="screen-wrap">
  <canvas id="screen" width="240" height="240"></canvas>
  <div id="error-overlay"></div>
</div>
<p class="controls-hint">Arrow keys = move &nbsp;|&nbsp; Z / Space = A &nbsp;|&nbsp; X = B &nbsp;|&nbsp; Enter = start &nbsp;|&nbsp; Shift = select</p>
<p id="status">loading wasmoon…</p>

<script src="lib/wasmoon/index.js"></script>
<script>
// ─────────────────────────────────────────────────────────────────────────────
// GCU Geode — Proof of Concept Runtime
// Validates: Wasmoon Lua VM + Canvas pixel buffer + Input + Game loop
// ─────────────────────────────────────────────────────────────────────────────

(async function () {
  'use strict';

  const statusEl = document.getElementById('status');
  const canvas   = document.getElementById('screen');
  const ctx      = canvas.getContext('2d');
  const errOverlay = document.getElementById('error-overlay');

  const W = 240, H = 240;
  const imgData = ctx.createImageData(W, H);
  const buf = imgData.data; // Uint8ClampedArray, 4 bytes per pixel (RGBA)

  // ── Sweetie-16 palette (CC0 public domain) ──────────────────────────────
  // https://lospec.com/palette-list/sweetie-16
  const PALETTE = [
    0x1a1c2c, // 0  black
    0x5d275d, // 1  dark purple
    0xb13e53, // 2  dark red
    0xef7d57, // 3  orange
    0xffcd75, // 4  yellow
    0xa7f070, // 5  light green
    0x38b764, // 6  green
    0x257179, // 7  dark teal
    0x29366f, // 8  dark blue
    0x3b5dc9, // 9  blue
    0x41a6f6, // 10 light blue
    0x73eff7, // 11 cyan
    0xf4f4f4, // 12 white
    0x94b0c2, // 13 light gray
    0x566c86, // 14 gray
    0x333c57, // 15 dark gray
  ];

  // ── 5x7 pixel font ─────────────────────────────────────────────────────
  // Covers printable ASCII 0x20..0x7E (space..tilde). Each char is 5 wide,
  // 7 tall, packed as 5 bytes (one per column, LSB = top row).
  // Glyph spacing: 1px between chars → 6px per character cell.
  const FONT_W = 5, FONT_H = 7, FONT_SPACE = 1;
  const FONT = [
    // space ! " # $ % & ' ( ) * + , - . /
    [0x00,0x00,0x00,0x00,0x00],[0x00,0x00,0x5f,0x00,0x00],[0x00,0x07,0x00,0x07,0x00],
    [0x14,0x7f,0x14,0x7f,0x14],[0x24,0x2a,0x7f,0x2a,0x12],[0x23,0x13,0x08,0x64,0x62],
    [0x36,0x49,0x55,0x22,0x50],[0x00,0x00,0x07,0x00,0x00],[0x00,0x1c,0x22,0x41,0x00],
    [0x00,0x41,0x22,0x1c,0x00],[0x14,0x08,0x3e,0x08,0x14],[0x08,0x08,0x3e,0x08,0x08],
    [0x00,0x50,0x30,0x00,0x00],[0x08,0x08,0x08,0x08,0x08],[0x00,0x60,0x60,0x00,0x00],
    [0x20,0x10,0x08,0x04,0x02],
    // 0-9
    [0x3e,0x51,0x49,0x45,0x3e],[0x00,0x42,0x7f,0x40,0x00],[0x42,0x61,0x51,0x49,0x46],
    [0x21,0x41,0x45,0x4b,0x31],[0x18,0x14,0x12,0x7f,0x10],[0x27,0x45,0x45,0x45,0x39],
    [0x3c,0x4a,0x49,0x49,0x30],[0x01,0x71,0x09,0x05,0x03],[0x36,0x49,0x49,0x49,0x36],
    [0x06,0x49,0x49,0x29,0x1e],
    // : ; < = > ? @
    [0x00,0x36,0x36,0x00,0x00],[0x00,0x56,0x36,0x00,0x00],[0x08,0x14,0x22,0x41,0x00],
    [0x14,0x14,0x14,0x14,0x14],[0x00,0x41,0x22,0x14,0x08],[0x02,0x01,0x51,0x09,0x06],
    [0x3e,0x41,0x5d,0x55,0x1e],
    // A-Z
    [0x7e,0x09,0x09,0x09,0x7e],[0x7f,0x49,0x49,0x49,0x36],[0x3e,0x41,0x41,0x41,0x22],
    [0x7f,0x41,0x41,0x22,0x1c],[0x7f,0x49,0x49,0x49,0x41],[0x7f,0x09,0x09,0x09,0x01],
    [0x3e,0x41,0x49,0x49,0x7a],[0x7f,0x08,0x08,0x08,0x7f],[0x00,0x41,0x7f,0x41,0x00],
    [0x20,0x40,0x41,0x3f,0x01],[0x7f,0x08,0x14,0x22,0x41],[0x7f,0x40,0x40,0x40,0x40],
    [0x7f,0x02,0x0c,0x02,0x7f],[0x7f,0x04,0x08,0x10,0x7f],[0x3e,0x41,0x41,0x41,0x3e],
    [0x7f,0x09,0x09,0x09,0x06],[0x3e,0x41,0x51,0x21,0x5e],[0x7f,0x09,0x19,0x29,0x46],
    [0x26,0x49,0x49,0x49,0x32],[0x01,0x01,0x7f,0x01,0x01],[0x3f,0x40,0x40,0x40,0x3f],
    [0x1f,0x20,0x40,0x20,0x1f],[0x3f,0x40,0x38,0x40,0x3f],[0x63,0x14,0x08,0x14,0x63],
    [0x07,0x08,0x70,0x08,0x07],[0x61,0x51,0x49,0x45,0x43],
    // [ \ ] ^ _ `
    [0x00,0x7f,0x41,0x41,0x00],[0x02,0x04,0x08,0x10,0x20],[0x00,0x41,0x41,0x7f,0x00],
    [0x04,0x02,0x01,0x02,0x04],[0x40,0x40,0x40,0x40,0x40],[0x00,0x01,0x02,0x04,0x00],
    // a-z
    [0x20,0x54,0x54,0x54,0x78],[0x7f,0x48,0x44,0x44,0x38],[0x38,0x44,0x44,0x44,0x20],
    [0x38,0x44,0x44,0x48,0x7f],[0x38,0x54,0x54,0x54,0x18],[0x08,0x7e,0x09,0x01,0x02],
    [0x0c,0x52,0x52,0x52,0x3e],[0x7f,0x08,0x04,0x04,0x78],[0x00,0x44,0x7d,0x40,0x00],
    [0x20,0x40,0x44,0x3d,0x00],[0x7f,0x10,0x28,0x44,0x00],[0x00,0x41,0x7f,0x40,0x00],
    [0x7c,0x04,0x18,0x04,0x78],[0x7c,0x08,0x04,0x04,0x78],[0x38,0x44,0x44,0x44,0x38],
    [0x7c,0x14,0x14,0x14,0x08],[0x08,0x14,0x14,0x18,0x7c],[0x7c,0x08,0x04,0x04,0x08],
    [0x48,0x54,0x54,0x54,0x20],[0x04,0x3f,0x44,0x40,0x20],[0x3c,0x40,0x40,0x20,0x7c],
    [0x1c,0x20,0x40,0x20,0x1c],[0x3c,0x40,0x30,0x40,0x3c],[0x44,0x28,0x10,0x28,0x44],
    [0x0c,0x50,0x50,0x50,0x3c],[0x44,0x64,0x54,0x4c,0x44],
    // { | } ~
    [0x00,0x08,0x36,0x41,0x00],[0x00,0x00,0x7f,0x00,0x00],[0x00,0x41,0x36,0x08,0x00],
    [0x08,0x04,0x08,0x10,0x08],
  ];

  // ── Color resolution ───────────────────────────────────────────────────
  let penColor = 12; // default: white

  function resolveColor(c) {
    if (c === undefined || c === null) return resolveRGB(penColor);
    return resolveRGB(c);
  }

  function resolveRGB(c) {
    if (c >= 0 && c <= 15) {
      const hex = PALETTE[c];
      return [(hex >> 16) & 0xff, (hex >> 8) & 0xff, hex & 0xff];
    }
    if (c > 255) {
      return [(c >> 16) & 0xff, (c >> 8) & 0xff, c & 0xff];
    }
    // fallback: palette 0
    const hex = PALETTE[0];
    return [(hex >> 16) & 0xff, (hex >> 8) & 0xff, hex & 0xff];
  }

  // ── Pixel buffer helpers ───────────────────────────────────────────────
  function setPixel(x, y, r, g, b) {
    x = x | 0; y = y | 0;
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    const i = (y * W + x) * 4;
    buf[i] = r; buf[i+1] = g; buf[i+2] = b; buf[i+3] = 255;
  }

  // ── Drawing API ────────────────────────────────────────────────────────
  function api_cls(c) {
    const [r, g, b] = resolveColor(c !== undefined ? c : 0);
    for (let i = 0; i < buf.length; i += 4) {
      buf[i] = r; buf[i+1] = g; buf[i+2] = b; buf[i+3] = 255;
    }
  }

  function api_color(c) {
    if (c !== undefined && c !== null) penColor = c;
  }

  function api_pix(x, y, c) {
    const [r, g, b] = resolveColor(c);
    setPixel(x, y, r, g, b);
  }

  function api_line(x1, y1, x2, y2, c) {
    const [r, g, b] = resolveColor(c);
    // Bresenham
    x1 = Math.round(x1); y1 = Math.round(y1);
    x2 = Math.round(x2); y2 = Math.round(y2);
    let dx = Math.abs(x2 - x1), sx = x1 < x2 ? 1 : -1;
    let dy = -Math.abs(y2 - y1), sy = y1 < y2 ? 1 : -1;
    let err = dx + dy;
    for (;;) {
      setPixel(x1, y1, r, g, b);
      if (x1 === x2 && y1 === y2) break;
      const e2 = 2 * err;
      if (e2 >= dy) { err += dy; x1 += sx; }
      if (e2 <= dx) { err += dx; y1 += sy; }
    }
  }

  function api_rect(x, y, w, h, c) {
    const [r, g, b] = resolveColor(c);
    x = Math.round(x); y = Math.round(y);
    w = Math.round(w); h = Math.round(h);
    for (let i = 0; i < w; i++) {
      setPixel(x + i, y, r, g, b);
      setPixel(x + i, y + h - 1, r, g, b);
    }
    for (let j = 0; j < h; j++) {
      setPixel(x, y + j, r, g, b);
      setPixel(x + w - 1, y + j, r, g, b);
    }
  }

  function api_rectfill(x, y, w, h, c) {
    const [r, g, b] = resolveColor(c);
    x = Math.round(x); y = Math.round(y);
    w = Math.round(w); h = Math.round(h);
    for (let j = 0; j < h; j++) {
      for (let i = 0; i < w; i++) {
        setPixel(x + i, y + j, r, g, b);
      }
    }
  }

  function api_circ(cx, cy, rad, c) {
    const [r, g, b] = resolveColor(c);
    cx = Math.round(cx); cy = Math.round(cy); rad = Math.round(rad);
    // Midpoint circle
    let x = rad, y = 0, err = 1 - rad;
    while (x >= y) {
      setPixel(cx + x, cy + y, r, g, b);
      setPixel(cx + y, cy + x, r, g, b);
      setPixel(cx - y, cy + x, r, g, b);
      setPixel(cx - x, cy + y, r, g, b);
      setPixel(cx - x, cy - y, r, g, b);
      setPixel(cx - y, cy - x, r, g, b);
      setPixel(cx + y, cy - x, r, g, b);
      setPixel(cx + x, cy - y, r, g, b);
      y++;
      if (err < 0) {
        err += 2 * y + 1;
      } else {
        x--;
        err += 2 * (y - x) + 1;
      }
    }
  }

  function api_circfill(cx, cy, rad, c) {
    const [r, g, b] = resolveColor(c);
    cx = Math.round(cx); cy = Math.round(cy); rad = Math.round(rad);
    let x = rad, y = 0, err = 1 - rad;
    function hline(lx, rx, py) {
      for (let i = lx; i <= rx; i++) setPixel(i, py, r, g, b);
    }
    while (x >= y) {
      hline(cx - x, cx + x, cy + y);
      hline(cx - x, cx + x, cy - y);
      hline(cx - y, cx + y, cy + x);
      hline(cx - y, cx + y, cy - x);
      y++;
      if (err < 0) {
        err += 2 * y + 1;
      } else {
        x--;
        err += 2 * (y - x) + 1;
      }
    }
  }

  function api_tri(x1, y1, x2, y2, x3, y3, c) {
    api_line(x1, y1, x2, y2, c);
    api_line(x2, y2, x3, y3, c);
    api_line(x3, y3, x1, y1, c);
  }

  function api_trifill(x1, y1, x2, y2, x3, y3, c) {
    const [r, g, b] = resolveColor(c);
    // Sort vertices by y
    let verts = [{x: Math.round(x1), y: Math.round(y1)},
                 {x: Math.round(x2), y: Math.round(y2)},
                 {x: Math.round(x3), y: Math.round(y3)}];
    verts.sort((a, b) => a.y - b.y);
    const [v0, v1, v2] = verts;
    function scanline(ya, yb, xa, xb, xc, xd) {
      for (let y = ya; y <= yb; y++) {
        const t1 = (yb - ya) === 0 ? 1 : (y - ya) / (yb - ya);
        const t2 = (yb - ya) === 0 ? 1 : (y - ya) / (yb - ya);
        let lx = Math.round(xa + t1 * (xb - xa));
        let rx = Math.round(xc + t2 * (xd - xc));
        if (lx > rx) { let tmp = lx; lx = rx; rx = tmp; }
        for (let x = lx; x <= rx; x++) setPixel(x, y, r, g, b);
      }
    }
    // Upper half
    for (let y = v0.y; y <= v1.y; y++) {
      const dy01 = v1.y - v0.y || 1;
      const dy02 = v2.y - v0.y || 1;
      const t1 = (y - v0.y) / dy01;
      const t2 = (y - v0.y) / dy02;
      let lx = Math.round(v0.x + t1 * (v1.x - v0.x));
      let rx = Math.round(v0.x + t2 * (v2.x - v0.x));
      if (lx > rx) { let tmp = lx; lx = rx; rx = tmp; }
      for (let x = lx; x <= rx; x++) setPixel(x, y, r, g, b);
    }
    // Lower half
    for (let y = v1.y + 1; y <= v2.y; y++) {
      const dy12 = v2.y - v1.y || 1;
      const dy02 = v2.y - v0.y || 1;
      const t1 = (y - v1.y) / dy12;
      const t2 = (y - v0.y) / dy02;
      let lx = Math.round(v1.x + t1 * (v2.x - v1.x));
      let rx = Math.round(v0.x + t2 * (v2.x - v0.x));
      if (lx > rx) { let tmp = lx; lx = rx; rx = tmp; }
      for (let x = lx; x <= rx; x++) setPixel(x, y, r, g, b);
    }
  }

  // ── Text ───────────────────────────────────────────────────────────────
  function api_print(text, x, y, c) {
    if (text === undefined || text === null) return;
    text = String(text);
    const [r, g, b] = resolveColor(c);
    x = Math.round(x || 0);
    y = Math.round(y || 0);
    for (let ci = 0; ci < text.length; ci++) {
      const code = text.charCodeAt(ci) - 0x20;
      if (code < 0 || code >= FONT.length) { x += FONT_W + FONT_SPACE; continue; }
      const glyph = FONT[code];
      for (let col = 0; col < FONT_W; col++) {
        const bits = glyph[col];
        for (let row = 0; row < FONT_H; row++) {
          if (bits & (1 << row)) {
            setPixel(x + col, y + row, r, g, b);
          }
        }
      }
      x += FONT_W + FONT_SPACE;
    }
  }

  // ── Input ──────────────────────────────────────────────────────────────
  const keys = {};
  const keysPressed = {};  // just-pressed this frame
  const keysPrev = {};     // held last frame

  const KEY_MAP = {
    'ArrowUp': 'up', 'ArrowDown': 'down', 'ArrowLeft': 'left', 'ArrowRight': 'right',
    'z': 'a', 'Z': 'a', ' ': 'a',
    'x': 'b', 'X': 'b',
    'Enter': 'start',
    'Shift': 'select',
  };

  document.addEventListener('keydown', (e) => {
    const mapped = KEY_MAP[e.key];
    if (mapped) { keys[mapped] = true; e.preventDefault(); }
  });
  document.addEventListener('keyup', (e) => {
    const mapped = KEY_MAP[e.key];
    if (mapped) { keys[mapped] = false; e.preventDefault(); }
  });

  function tickInput() {
    for (const k in keys) {
      keysPressed[k] = keys[k] && !keysPrev[k];
      keysPrev[k] = keys[k];
    }
  }

  function api_btn(id) {
    return !!keys[id];
  }

  function api_btnp(id) {
    return !!keysPressed[id];
  }

  function api_dpad() {
    let dx = 0, dy = 0;
    if (keys['left'])  dx -= 1;
    if (keys['right']) dx += 1;
    if (keys['up'])    dy -= 1;
    if (keys['down'])  dy += 1;
    return [dx, dy]; // Wasmoon will convert JS array to Lua multi-return
  }

  function api_stick() {
    return [0, 0]; // no analog stick in POC
  }

  // ── Math aliases ───────────────────────────────────────────────────────
  function api_rnd(n) {
    return Math.random() * (n === undefined ? 1 : n);
  }
  function api_flr(x) { return Math.floor(x); }
  function api_ceil(x) { return Math.ceil(x); }
  function api_abs(x) { return Math.abs(x); }
  function api_sin(x) { return Math.sin(x); }
  function api_cos(x) { return Math.cos(x); }
  function api_atan2(y, x) { return Math.atan2(y, x); }
  function api_min(a, b) { return Math.min(a, b); }
  function api_max(a, b) { return Math.max(a, b); }
  function api_mid(a, b, c) {
    // middle of three values (clamp)
    if (a > b) { let t = a; a = b; b = t; }
    if (b > c) { b = c; }
    if (a > b) { b = a; }
    return b;
  }
  function api_sgn(x) { return x > 0 ? 1 : x < 0 ? -1 : 0; }

  // ── Audio (simple oscillator) ──────────────────────────────────────────
  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  const WAVE_TYPES = ['square', 'sawtooth', 'triangle'];

  function api_sfx(freq, dur, wave) {
    const ctx = ensureAudio();
    freq = freq || 440;
    dur = dur || 0.1;
    const type = (wave === 3) ? 'square' : (WAVE_TYPES[wave || 0] || 'square');
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    if (wave === 3) {
      // noise approximation: rapid frequency modulation
      osc.type = 'square';
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      // modulate for noise-like effect
      for (let t = 0; t < dur; t += 0.005) {
        osc.frequency.setValueAtTime(freq * (0.5 + Math.random()), ctx.currentTime + t);
      }
    } else {
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
    }
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + dur);
  }

  function api_beep(freq, dur) {
    api_sfx(freq || 440, dur || 0.1, 0);
  }

  // Note name → frequency
  const NOTE_NAMES = { C:0, D:2, E:4, F:5, G:7, A:9, B:11 };
  function api_note(name, dur) {
    if (!name || typeof name !== 'string') return;
    const match = name.match(/^([A-Ga-g])(#|b)?(\d)$/);
    if (!match) return;
    let semitone = NOTE_NAMES[match[1].toUpperCase()];
    if (match[2] === '#') semitone++;
    if (match[2] === 'b') semitone--;
    const octave = parseInt(match[3]);
    const midi = semitone + (octave + 1) * 12;
    const freq = 440 * Math.pow(2, (midi - 69) / 12);
    api_sfx(freq, dur || 0.2, 0);
  }

  // ── Screen info ────────────────────────────────────────────────────────
  const screenInfo = { w: W, h: H, name: 'ST7789sq' };

  // ── Error display ──────────────────────────────────────────────────────
  function showError(msg) {
    errOverlay.textContent = 'GEODE RUNTIME ERROR\n\n' + msg;
    errOverlay.classList.add('visible');
  }

  // ── Boot sequence ──────────────────────────────────────────────────────
  statusEl.textContent = 'initializing lua vm…';

  const factory = new wasmoon.LuaFactory('lib/wasmoon/glue.wasm');
  const lua = await factory.createEngine();

  statusEl.textContent = 'binding api…';

  // Bind all API functions to Lua globals
  const G = lua.global;

  // Screen table
  G.set('screen', screenInfo);

  // Drawing
  G.set('cls',      api_cls);
  G.set('color',    api_color);
  G.set('pix',      api_pix);
  G.set('line',     api_line);
  G.set('rect',     api_rect);
  G.set('rectfill', api_rectfill);
  G.set('circ',     api_circ);
  G.set('circfill', api_circfill);
  G.set('tri',      api_tri);
  G.set('trifill',  api_trifill);
  G.set('print',    api_print);

  // Input
  G.set('btn',  api_btn);
  G.set('btnp', api_btnp);
  // dpad and stick return multiple values — we handle with wrapper Lua
  G.set('_js_dpad',  api_dpad);
  G.set('_js_stick', api_stick);

  // Math
  G.set('rnd',   api_rnd);
  G.set('flr',   api_flr);
  G.set('ceil',  api_ceil);
  G.set('abs',   api_abs);
  G.set('sin',   api_sin);
  G.set('cos',   api_cos);
  G.set('atan2', api_atan2);
  G.set('min',   api_min);
  G.set('max',   api_max);
  G.set('mid',   api_mid);
  G.set('sgn',   api_sgn);

  // Audio
  G.set('sfx',  api_sfx);
  G.set('beep', api_beep);
  G.set('note', api_note);

  // Lua wrappers for multi-return functions
  await lua.doString(`
    function dpad()
      local r = _js_dpad()
      return r[1], r[2]
    end
    function stick(n)
      local r = _js_stick(n)
      return r[1], r[2]
    end
  `);

  // ── Demo game (Lua) ───────────────────────────────────────────────────
  const DEMO_LUA = `
-- Paddle & Ball — GCU Geode POC demo
-- Exercises: _init, _update, _draw, cls, rectfill, circfill, print,
--            btn, rnd, flr, mid, screen.w/h

local sw, sh = screen.w, screen.h

-- paddle
local pw, ph = 40, 6
local px, py
local speed = 180

-- ball
local bx, by, bvx, bvy
local br = 4

-- score
local score = 0
local hi = 0

-- bricks
local cols = 10
local rows = 5
local bw, bh = 22, 8
local bricks = {}
local brick_gap = 2
local brick_ox = 0

function reset_bricks()
  brick_ox = (sw - cols * (bw + brick_gap) + brick_gap) / 2
  bricks = {}
  for r = 1, rows do
    bricks[r] = {}
    for c = 1, cols do
      bricks[r][c] = true
    end
  end
end

function reset_ball()
  bx = sw / 2
  by = sh / 2 + 30
  local angle = rnd(1.2) + 0.9  -- roughly 50-120 degrees
  bvx = cos(angle) * 120
  bvy = -abs(sin(angle) * 120)
end

function _init()
  px = (sw - pw) / 2
  py = sh - 20
  reset_ball()
  reset_bricks()
  score = 0
end

function _update(dt)
  -- paddle movement
  if btn("left") then
    px = px - speed * dt
  end
  if btn("right") then
    px = px + speed * dt
  end
  px = mid(0, px, sw - pw)

  -- ball movement
  bx = bx + bvx * dt
  by = by + bvy * dt

  -- wall bounces
  if bx - br < 0 then
    bx = br
    bvx = abs(bvx)
  end
  if bx + br > sw then
    bx = sw - br
    bvx = -abs(bvx)
  end
  if by - br < 0 then
    by = br
    bvy = abs(bvy)
  end

  -- paddle collision
  if bvy > 0 and by + br >= py and by + br <= py + ph and bx >= px and bx <= px + pw then
    bvy = -abs(bvy)
    -- angle based on hit position
    local hit = (bx - px) / pw - 0.5  -- -0.5 to 0.5
    bvx = bvx + hit * 100
    by = py - br
    beep(660, 0.05)
  end

  -- brick collision
  for r = 1, rows do
    for c = 1, cols do
      if bricks[r][c] then
        local bkx = brick_ox + (c - 1) * (bw + brick_gap)
        local bky = 30 + (r - 1) * (bh + brick_gap)
        if bx + br > bkx and bx - br < bkx + bw and by + br > bky and by - br < bky + bh then
          bricks[r][c] = false
          bvy = -bvy
          score = score + 10
          if score > hi then hi = score end
          beep(880, 0.03)
        end
      end
    end
  end

  -- check all bricks cleared
  local any = false
  for r = 1, rows do
    for c = 1, cols do
      if bricks[r][c] then any = true end
    end
  end
  if not any then
    reset_bricks()
    reset_ball()
    -- speed up
    speed = speed + 10
  end

  -- ball fell off bottom
  if by - br > sh then
    beep(220, 0.2)
    score = 0
    speed = 180
    reset_ball()
    reset_bricks()
  end
end

function _draw()
  cls(8)  -- dark blue

  -- bricks
  for r = 1, rows do
    for c = 1, cols do
      if bricks[r][c] then
        local bkx = brick_ox + (c - 1) * (bw + brick_gap)
        local bky = 30 + (r - 1) * (bh + brick_gap)
        -- color by row
        local colors = {2, 3, 4, 5, 10}
        rectfill(bkx, bky, bw, bh, colors[r])
      end
    end
  end

  -- paddle
  rectfill(px, py, pw, ph, 12)

  -- ball
  circfill(flr(bx), flr(by), br, 4)

  -- score
  print("SCORE " .. score, 4, 4, 12)
  print("HI " .. hi, sw - 60, 4, 13)

  -- title
  print("GEODE POC", sw/2 - 30, sh - 10, 14)
end
`;

  // ── Run game ───────────────────────────────────────────────────────────
  statusEl.textContent = 'running game…';

  try {
    await lua.doString(DEMO_LUA);
  } catch (e) {
    showError(e.message || String(e));
    statusEl.textContent = 'error in game code';
    return;
  }

  // Get lifecycle callbacks
  let fn_init, fn_update, fn_draw;
  try {
    fn_init   = G.get('_init');
    fn_update = G.get('_update');
    fn_draw   = G.get('_draw');
  } catch (e) {
    showError('Failed to get callbacks: ' + (e.message || e));
    statusEl.textContent = 'error';
    return;
  }

  // Call _init
  if (typeof fn_init === 'function') {
    try { fn_init(); } catch (e) {
      showError('_init error:\n' + (e.message || e));
      statusEl.textContent = 'error in _init';
      return;
    }
  }

  statusEl.textContent = 'running';

  // ── Game loop ──────────────────────────────────────────────────────────
  let lastTime = performance.now();
  let frameCount = 0;
  let fpsTime = 0;
  let fps = 0;

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.1); // cap dt at 100ms
    lastTime = now;

    // FPS counter
    frameCount++;
    fpsTime += dt;
    if (fpsTime >= 1) {
      fps = frameCount;
      frameCount = 0;
      fpsTime -= 1;
    }

    tickInput();

    try {
      if (typeof fn_update === 'function') fn_update(dt);
      if (typeof fn_draw === 'function') fn_draw();
    } catch (e) {
      showError(e.message || String(e));
      statusEl.textContent = 'runtime error';
      return; // stop loop
    }

    // FPS overlay (drawn in JS, not Lua)
    const fpsStr = fps + ' fps';
    // Draw directly on the pixel buffer
    const fpsColor = resolveRGB(14); // gray
    for (let ci = 0; ci < fpsStr.length; ci++) {
      const code = fpsStr.charCodeAt(ci) - 0x20;
      if (code < 0 || code >= FONT.length) continue;
      const glyph = FONT[code];
      const ox = W - (fpsStr.length - ci) * (FONT_W + FONT_SPACE);
      for (let col = 0; col < FONT_W; col++) {
        const bits = glyph[col];
        for (let row = 0; row < FONT_H; row++) {
          if (bits & (1 << row)) {
            setPixel(ox + col, H - FONT_H - 2 + row, fpsColor[0], fpsColor[1], fpsColor[2]);
          }
        }
      }
    }

    ctx.putImageData(imgData, 0, 0);
    requestAnimationFrame(gameLoop);
  }

  requestAnimationFrame(gameLoop);

})().catch(err => {
  document.getElementById('error-overlay').textContent = 'BOOT ERROR\n\n' + (err.message || err);
  document.getElementById('error-overlay').classList.add('visible');
  document.getElementById('status').textContent = 'boot error';
  console.error(err);
});
</script>
</body>
</html>
